<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' blob: file:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: file:; media-src 'self' blob: file:; frame-src 'self' file:"
    />

  <body>
    <div id="root"></div>
    <!-- Live2D Cubism Core：非 ESM 全局脚本，必须先于应用代码加载（classic script 先于 module script 执行）

         5.2+ 的 core 把 renderOrders 从 drawables 挪到了 model 上，pixi-live2d-display 0.4 首帧渲染会崩 -->
    <script src="./live2d/live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
